# ──────────────────────────────────────────────────────────────
# docker-compose.yml — Portainer-Stack ready.
#
# Portainer → Stacks → Add stack → Web editor (paste this) OR Git repository.
# Define the four env vars in the stack's "Environment variables" panel:
#
#   VITE_HA_URL=http://192.168.1.141:8123
#   VITE_HA_TOKEN=eyJhbGciOiJI…
#   DASHBOARD_PORT=8081           # living-room panel (kitchen uses 8080)
#   TZ=Africa/Johannesburg
#
# Local CLI:  ./deploy.sh   (sources .env automatically)
# ──────────────────────────────────────────────────────────────
services:
  living-room-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
      # Build-time secrets — Vite inlines these into the JS bundle.
      args:
        VITE_HA_URL: ${VITE_HA_URL:-}
        VITE_HA_TOKEN: ${VITE_HA_TOKEN:-}
    image: living-room-dashboard:latest
    container_name: living-room-dashboard
    restart: unless-stopped
    ports:
      - "${DASHBOARD_PORT:-8081}:80"
    environment:
      TZ: ${TZ:-Africa/Johannesburg}
    networks:
      - homelab
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

networks:
  homelab:
    driver: bridge
