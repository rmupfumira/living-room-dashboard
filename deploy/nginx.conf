# nginx config for the dashboard. SPA fallback (so client routing works if you
# ever add one) plus aggressive caching for hashed assets, no-store for index.html.

server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # gzip on common asset types — small but worth it on LAN clients with weak CPUs
    gzip on;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        application/xml
        image/svg+xml;
    gzip_min_length 1024;

    # Vite emits hashed filenames in /assets — safe to cache hard for a year.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html must never be cached, so deploys are visible immediately.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri =404;
    }

    # Proxy HLS camera streams to Home Assistant so they're same-origin.
    # hls.js fetches the .m3u8 + segments via XHR (CORS-restricted); serving them
    # from this origin sidesteps CORS. The URLs are token-signed by HA, so no
    # extra auth header is needed. Adjust the upstream if HA moves.
    location /api/hls/ {
        proxy_pass http://192.168.1.141:8123;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_buffering off;
    }

    # SPA fallback — anything else falls back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
